# fly.toml app configuration file generated for studydocs-backend-minhtu on 2026-04-19T15:18:33+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'studydocs-backend-minhtu'
primary_region = 'sin'

[build]


[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024

[processes]
  app = "sh -c 'npx prisma db push --accept-data-loss && node dist/src/main.js'"